# Objective defaults for VISM-lite. Each loss entry is config-driven so ablations
# can change both the weight and the query groups it applies to without editing code.
losses:
  containment:
    # Explicit inside/outside supervision only on containment anchor queries.
    weight: 2.0
    groups: [containment]
  weak_prior:
    # Weak atomic-union prior acts near the surface band by default.
    weight: 0.5
    groups: [surface_band]
  area:
    # Area regularization is evaluated on near-surface samples.
    weight: 1.0
    groups: [surface_band]
  volume:
    # Volume matching stays on broad global-space samples.
    weight: 0.5
    groups: [global]
  eikonal:
    # Eikonal uses the union of global + surface-band samples by default.
    weight: 0.1
    groups: [global, surface_band]

target_volume_fraction: 0.5
heaviside_eps: 0.1
delta_eps: 0.1
containment_margin: 0.5
